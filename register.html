<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/styleres.css">
</head>

<body>

<header>
    <h1>Restaurant Discovery Platform</h1>
</header>

<nav>
    <ul>
        <li><a href="indexres.html">Home</a></li>
        <li><a href="restaurants.html">Restaurants</a></li>
        <li><a href="recommend.html">Recommendations</a></li>
        <li><a href="register.html" class="active">Register</a></li>
        <li><a href="reservation.html">Reservation</a></li>
    </ul>
</nav>

<form id="registerForm">
    <h2>Create an Account</h2>

    <label for="username">Username</label>
    <input type="text" id="username">

    <label for="email">Email Address</label>
    <input type="email" id="email">

    <label for="phone">Phone Number</label>
    <input type="text" id="phone">

    <label for="password">Password</label>
    <input type="password" id="password">

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword">

    <label>Gender</label>
    <div class="radio-group">
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
    </div>

    <label for="dietary">Dietary Preferences</label>
    <select id="dietary">
        <option value="">Select preference</option>
        <option value="None">None</option>
        <option value="Halal">Halal</option>
        <option value="Vegan">Vegan</option>
    </select>

    <label for="country">Country/Region</label>
    <select id="country">
        <option value="">Select country</option>
        <option value="Australia">Australia</option>
        <option value="Malaysia">Malaysia</option>
    </select>

    <button type="submit">Register</button>

    <p id="registerError"></p>
</form>

<footer>
    <p>&copy; 2026 Restaurant Discovery Platform</p>
</footer>

<script src="js/script.js"></script>

</body>
</html>
